services:
  sv-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: sv_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://platform:platform@shared_postgres:5432/stock_verifier
      REDIS_URL: redis://shared_redis:6379/1
      API_PORT: 3100
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '3100:3100'
    networks:
      - shared_network
    command: sh -c "pnpm db:push && pnpm db:seed && node apps/api/dist/server.js"

  sv-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: sv_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://platform:platform@shared_postgres:5432/stock_verifier
      REDIS_URL: redis://shared_redis:6379/1
    networks:
      - shared_network
    depends_on:
      - sv-api

  sv-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: sv_web
    restart: unless-stopped
    ports:
      - '5173:80'
    networks:
      - shared_network
    depends_on:
      - sv-api

networks:
  shared_network:
    external: true
